trajectory_planner:
  ros__parameters:
    planner_backend: moving_target
    publish_rate_hz: 10.0
    output_horizon_sec: 2.0
    sampling_dt_sec: 0.1
    moving_target_lookahead_sec: 0.4
    approach_height: 5.0
    align_height: 3.5
    synchronize_height: 2.5
    terminal_height: 0.4
    default_terminal_xy_tolerance: 0.6
    default_terminal_z_tolerance: 0.3
    default_heading_tolerance_rad: 0.4
